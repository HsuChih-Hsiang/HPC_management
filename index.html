<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的互動展示頁面</title>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            transition: background-color 0.5s ease;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 350px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 0.5rem;
        }

        p {
            color: #666;
        }

        .counter-display {
            font-size: 3rem;
            font-weight: bold;
            color: #007bff;
            margin: 1rem 0;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 10px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:active {
            transform: scale(0.95);
        }

        .btn-add { background-color: #28a745; color: white; }
        .btn-reset { background-color: #dc3545; color: white; }
        .btn-theme { background-color: #6c757d; color: white; }

        button:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>你好！</h1>
        <p>這是一個簡單的 JS 互動計數器</p>
        
        <div class="counter-display" id="counter">0</div>

        <div class="btn-group">
            <button class="btn-add" onclick="increment()">點我加 1</button>
            <button class="btn-reset" onclick="reset()">歸零</button>
        </div>
        
        <br>
        <button class="btn-theme" onclick="toggleTheme()">切換深色模式</button>
    </div>

    <script>
        let count = 0;
        const counterElement = document.getElementById('counter');
        let isDarkMode = false;

        // 增加數字
        function increment() {
            count++;
            counterElement.innerText = count;
            // 隨機抖動效果
            counterElement.style.transform = "scale(1.1)";
            setTimeout(() => counterElement.style.transform = "scale(1)", 100);
        }

        // 歸零
        function reset() {
            count = 0;
            counterElement.innerText = count;
        }

        // 切換背景顏色
        function toggleTheme() {
            isDarkMode = !isDarkMode;
            if (isDarkMode) {
                document.body.style.backgroundColor = "#2c3e50";
                document.querySelector('.card').style.background = "#34495e";
                document.querySelector('.card').style.color = "white";
                document.querySelector('h1').style.color = "#ecf0f1";
                document.querySelector('p').style.color = "#bdc3c7";
            } else {
                document.body.style.backgroundColor = "#f0f2f5";
                document.querySelector('.card').style.background = "white";
                document.querySelector('.card').style.color = "black";
                document.querySelector('h1').style.color = "#333";
                document.querySelector('p').style.color = "#666";
            }
        }
    </script>

        data-base-api-url="http://140.112.2.99:3001/api/embed"
        src="http://140.112.2.99:3001/embed/anythingllm-chat-widget.min.js">
    </script>
</body>
</html>
