<!DOCTYPE html>
<html lang="zh-Hant" ng-app="emailApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>信箱管理</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/email_group.css') }}">
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
</head>
<body ng-controller="MailboxController">
    
    <button id="menuButton" class="menu-button" ng-click="toggleMenu()" aria-label="開啟選單">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
    </button>

    {% include 'sidebar.html' %}

    <div class="mailbox-layout">
        <div class="unassigned-emails-section group-item" id="unassignedEmailsSection">
            <div class="group-header">
                <strong>待分組信箱</strong>
            </div>
            <div class="email-list" id="unassignedEmailList">
                <p ng-if="unassignedEmails.length === 0">目前沒有待分組信箱。</p>
                
                <div class="email-item" 
                     draggable="true" 
                     ng-repeat="email in unassignedEmails" 
                     ng-ondragstart="onDragStart($event, email)">
                    <span>[[ email ]]</span>
                    <button class="delete-btn" ng-click="deleteEmail(unassignedGroupId, email)">刪除</button>
                </div>
            </div>
        </div>

        <div class="main-mailbox-content">
            <div class="container">
                <h1>📬 信箱管理</h1>
                
                <form class="email-form add-group-form" id="addGroupForm" ng-submit="addGroup()">
                    <input type="text" ng-model="newGroupName" placeholder="新增分組名稱" required>
                    <button type="submit" class="save-template-button">新增分組</button>
                </form>

                <div class="group-list" id="groupList">
                    <p ng-if="groups.length === 0">目前沒有分組。</p>

                    <div class="group-item" ng-repeat="group in groups">
                        <div class="group-header">
                            <strong>[[ group.name ]]</strong>
                            <button class="delete-btn" ng-click="deleteGroup(group.id)">刪除分組</button>
                        </div>
                        
                        <div class="email-list">
                            <p ng-if="group.emails.length === 0" style="text-align: center; color: #999; font-style: italic;">組內目前無信箱</p>
                            <div class="email-item" ng-repeat="email in group.emails">
                                <span>[[ email ]]</span>
                                <button class="delete-btn" ng-click="deleteEmail(group.id, email)">刪除</button>
                            </div>
                        </div>

                        <form class="email-form add-email-form" ng-submit="addEmail(group.id)">
                            <input type="email" 
                                   placeholder="新增信箱或將待分組信箱拖曳至此" 
                                   required 
                                   ng-model="emailInputs[group.id]"
                                   ng-ondragover="onDragOver($event)" 
                                   ng-ondrop="onDrop($event, group.id)">
                            <button type="submit" class="save-template-button">新增信箱</button>
                        </form>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script src="{{ url_for('static', filename='js/mailbox_manager.ctrl.js') }}"></script>
</body>
</html>
