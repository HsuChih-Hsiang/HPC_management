<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>編輯郵件模板</title>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/email.css') }}">
</head>
<body>
    <button id="menuButton" class="menu-button" aria-label="開啟選單">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
    </button>

    <div id="sideMenu" class="side-menu">
        <button id="closeMenuButton" class="close-menu-button">&times;</button>
        <h2>功能選單</h2>
        <nav>
            <ul>
                <li><a href="/" class="menu-item">📨 寄送郵件</a></li>
                <li><a href="/edit-templates" class="menu-item active">📝 編輯模板</a></li>
                <li><a href="/hpc-usage" class="menu-item">📊 HPC 用量通知</a></li>
                <li><a href="/hpc-contact" class="menu-item">👥 HPC帳號管理</a></li>
                <li><a href="/mailbox-manager" class="menu-item">📬 信箱管理</a></li>
                <li><a href="/setting" class="menu-item">⚙️ 設定</a></li>
            </ul>
        </nav>
    </div>

    <div class="main-layout-container">
        <div class="left-template-list">
            <h2>所有已儲存模板</h2>
            <div id="templateList" class="template-list-scrollable">
                <p id="noTemplatesMessage">目前沒有儲存的模板。</p>
            </div>
        </div>

        <div class="right-editor-container container">
            <h1>📝 編輯郵件模板</h1>

            <div id="editForm" class="email-form">
                <div class="form-group">
                    <label for="templateName">模板名稱:</label>
                    <input type="text" id="templateName" required placeholder="為你的模板命名">
                </div>

                <div class="form-group">
                    <label for="templateSubject">模板主旨:</label>
                    <input type="text" id="templateSubject" placeholder="模板主旨 (選填)">
                </div>

                <div class="form-group">
                    <label for="templateEditor">模板內容 (HTML 編輯器):</label>
                    <div id="templateEditor"></div>
                </div>

                <div class="button-group">
                    <button type="button" id="saveButton" class="send-button">儲存模板</button>
                    <button type="button" id="cancelButton" class="cancel-button">取消編輯</button>
                </div>
            </div>

            <div id="messageBox" class="message-box" style="display:none;"></div>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <script src="{{ url_for('static', filename='js/edit_templates.js') }}"></script>
    <script src="{{ url_for('static', filename='js/index.js') }}"></script> </body>
</html>
