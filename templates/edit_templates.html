<!DOCTYPE html>
<html lang="zh-Hant" ng-app="emailApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>編輯郵件模板</title>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/email.css') }}">
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <style>
        [ng\:cloak], [ng-cloak], .ng-cloak { display: none !important; }
    </style>
</head>
<body ng-controller="EditTemplatesController" ng-cloak>
    <button class="menu-button" ng-click="toggleMenu()" aria-label="開啟選單">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
    </button>

    {% include 'sidebar.html' %}

    <div class="main-layout-container">
        <div class="left-template-list">
            <h2>所有已儲存模板</h2>
            <div class="template-list-scrollable">
                <p ng-if="templates.length === 0">目前沒有儲存的模板。</p>
                
                <div class="template-list-item" ng-repeat="tpl in templates" ng-click="editTemplate(tpl)">
                    <h3 ng-bind="tpl.name"></h3>
                    <p>主旨: <span ng-bind="tpl.subject || '(無主旨)'"></span></p>
                    <div class="template-actions">
                        <button class="delete-btn" ng-click="deleteTemplate(tpl, $event)">刪除</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="editForm" class="right-editor-container container">
            <h1 ng-bind="currentEditingTemplateId ? '📝 更新郵件模板' : '📝 新增郵件模板'"></h1>

            <form class="email-form" ng-submit="saveTemplate()">
                <div class="form-group">
                    <label for="templateName">模板名稱:</label>
                    <input type="text" id="templateName" required placeholder="為你的模板命名" ng-model="templateData.name">
                </div>

                <div class="form-group">
                    <label for="templateSubject">模板主旨:</label>
                    <input type="text" id="templateSubject" placeholder="模板主旨 (選填)" ng-model="templateData.subject">
                </div>

                <div class="form-group">
                    <label for="templateEditor">模板內容 (HTML 編輯器):</label>
                    <div quill-editor ng-model="templateData.html" style="height: 300px;"></div>
                </div>

                <div class="button-group">
                    <button type="submit" class="send-button" ng-bind="currentEditingTemplateId ? '更新模板' : '儲存模板'"></button>
                    <button type="button" class="cancel-button" ng-click="cancelEdit()">取消編輯</button>
                </div>
            </form>

            <div ng-class="['message-box', message.type]" ng-show="message.visible" ng-bind="message.text"></div>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script src="{{ url_for('static', filename='js/edit_templates.ctrl.js') }}"></script>
</body>
</html>
