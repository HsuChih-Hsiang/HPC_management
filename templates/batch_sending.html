<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML 郵件寄送器</title>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/email.css') }}">
</head>
<body>
    <button id="menuButton" class="menu-button" aria-label="開啟選單">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
    </button>

    <div id="sideMenu" class="side-menu">
        <button id="closeMenuButton" class="close-menu-button">&times;</button>
        <h2>功能選單</h2>
        <nav>
            <ul>
                <li><a href="/" class="menu-item active">📨 寄送郵件</a></li>
                <li><a href="/edit-templates" class="menu-item">📝 編輯模板</a></li>
                <li><a href="/hpc-usage" class="menu-item">📊 HPC 用量通知</a></li>
                <li><a href="/hpc-contact" class="menu-item">👥 HPC帳號管理</a></li>
                <li><a href="/mailbox-manager" class="menu-item">📬 信箱管理</a></li>
                <li><a href="/setting" class="menu-item">⚙️ 設定</a></li>
            </ul>
        </nav>
    </div>

    <div class="container">
        <h1>📨 寄送 HTML 電子郵件</h1>

        <form id="emailForm" class="email-form">
            <div class="form-group">
                <label for="to">收件人電子郵件 (<span class="optional">必填</span>):</label>
                <div class="email-input-container" id="toEmails">
                    <input type="email" id="to" name="to" class="email-input">
                    <button type="button" id="addGroupButton" class="text-button" title="群組新增">群組新增</button>
                </div>
            </div>

            <div class="form-group">
                <label for="cc">副本 (CC):</label>
                <div class="email-input-container" id="ccEmails">
                    <input type="email" id="cc" name="cc" class="email-input">
                    <button type="button" id="addGroupButtonCc" class="text-button" title="群組新增">群組新增</button>
                    <button type="button" id="toggleBccButton" class="icon-button" title="顯示/隱藏密件副本"></button>   
                </div>
            </div>

            <div id="bccGroup" class="form-group" style="display:none;">
                <label for="bcc">密件副本 (BCC):</label>
                <div class="email-input-container" id="bccEmails">
                    <input type="email" id="bcc" name="bcc" class="email-input">
                    <button type="button" id="addGroupButtonBcc" class="text-button" title="群組新增">群組新增</button>
                </div>
            </div>

            <div class="form-group">
                <label for="subject">郵件主旨 (<span class="optional">必填</span>):</label>
                <input type="text" id="subject" name="subject">
            </div>

            <div class="form-group">
                <div class="label-with-button">
                    <label for="editor">郵件內容 (HTML 編輯器):</label>
                    <button type="button" id="openTemplateModalButton" class="select-template-button">選擇模板</button>
                </div>
                <div id="editor-container"></div>
                <textarea id="emailBodyHidden" name="emailBody" style="display:none;"></textarea>
            </div>

            <div class="action-buttons-group">
                <button type="button" id="saveTemplateButton" class="save-template-button">💾 儲存為模板</button>
                <button type="submit" class="send-button">寄送郵件</button>
            </div>
        </form>

        <div id="messageBox" class="message-box" style="display:none;"></div>
    </div>

    <div id="templateModal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2>選擇郵件模板</h2>
            <div id="templateListInModal" class="template-list-in-modal">
                <p id="noTemplatesMessageModal">目前沒有儲存的模板。</p>
            </div>
            <button id="clearTemplateButton" class="clear-template-button">清空當前內容</button>
        </div>
    </div>

    <div id="groupModal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2>選擇電子郵件群組</h2>
            <div class="group-list-container">
                <div id="groupList">
                    </div>
            </div>
            <div class="modal-actions">
                <button id="selectAllGroupsButton" class="modal-button select-all-button" type="button">全選</button>
                <button id="addSelectedEmailsButton" class="modal-button add-button" type="button">確認</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <script src="{{ url_for('static', filename='js/batch_sending.js') }}"></script>
    <script src="{{ url_for('static', filename='js/index.js') }}"></script>
</body>
</html>
