<!DOCTYPE html>
<html lang="zh-Hant" ng-app="emailApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML 郵件寄送器</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/email.css') }}">
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tinymce@7/tinymce.min.js" referrerpolicy="origin"></script>
    <style>
        [ng\:cloak], [ng-cloak], .ng-cloak { display: none !important; }
    </style>
</head>
<body ng-controller="BatchSendingController" ng-cloak>
    <button class="menu-button" ng-click="toggleMenu()" aria-label="開啟選單">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
    </button>

    {% include 'sidebar.html' %}

    <div class="container">
        <h1>📨 寄送 HTML 電子郵件</h1>

        <form class="email-form" ng-submit="sendEmail()">
            <div class="form-group">
                <label>收件人電子郵件 (<span class="optional">必填</span>):</label>
                <div class="email-input-container" droppable-area="to">
                    <div class="email-tag" ng-repeat="email in mailData.to track by $index" draggable-tag="to" ng-dblclick="editTag(email, 'to', $index)">
                        <span class="email-text" ng-bind="email"></span>
                        <button type="button" class="remove-email-btn" ng-click="removeTag('to', $index)">×</button>
                    </div>
                    <input type="email" ng-model="inputs.to" class="email-input" 
                           ng-keydown="addTag($event, 'to')" ng-blur="addTag(null, 'to')" ng-paste="handlePaste($event, 'to')">
                    <button type="button" class="text-button" title="群組新增" ng-click="openGroupModal('to')">群組新增</button>
                </div>
            </div>

            <div class="form-group">
                <label>副本 (CC):</label>
                <div class="email-input-container" droppable-area="cc">
                    <div class="email-tag" ng-repeat="email in mailData.cc track by $index" draggable-tag="cc" ng-dblclick="editTag(email, 'cc', $index)">
                        <span class="email-text" ng-bind="email"></span>
                        <button type="button" class="remove-email-btn" ng-click="removeTag('cc', $index)">×</button>
                    </div>
                    <input type="email" ng-model="inputs.cc" class="email-input" 
                           ng-keydown="addTag($event, 'cc')" ng-blur="addTag(null, 'cc')" ng-paste="handlePaste($event, 'cc')">
                    <button type="button" class="text-button" title="群組新增" ng-click="openGroupModal('cc')">群組新增</button>
                    <button type="button" class="icon-button" ng-class="{'active': showBcc}" title="顯示/隱藏密件副本" ng-click="toggleBcc()"></button>   
                </div>
            </div>

            <div class="form-group" ng-show="showBcc">
                <label>密件副本 (BCC):</label>
                <div class="email-input-container" droppable-area="bcc">
                    <div class="email-tag" ng-repeat="email in mailData.bcc track by $index" draggable-tag="bcc" ng-dblclick="editTag(email, 'bcc', $index)">
                        <span class="email-text" ng-bind="email"></span>
                        <button type="button" class="remove-email-btn" ng-click="removeTag('bcc', $index)">×</button>
                    </div>
                    <input type="email" ng-model="inputs.bcc" class="email-input" 
                           ng-keydown="addTag($event, 'bcc')" ng-blur="addTag(null, 'bcc')" ng-paste="handlePaste($event, 'bcc')">
                    <button type="button" class="text-button" title="群組新增" ng-click="openGroupModal('bcc')">群組新增</button>
                </div>
            </div>

            <div class="form-group">
                <label>郵件主旨 (<span class="optional">必填</span>):</label>
                <input type="text" ng-model="mailData.subject">
            </div>

            <div class="form-group">
                <div class="label-with-button">
                    <label>郵件內容 (HTML 編輯器):</label>
                    <button type="button" class="select-template-button" ng-click="openTemplateModal()">選擇模板</button>
                </div>
                <textarea tinymce-editor ng-model="mailData.body" style="height: 350px;"></textarea>
            </div>

            <div class="action-buttons-group">
                <button type="button" class="save-template-button" ng-click="saveTemplate()">💾 儲存為模板</button>
                <button type="submit" class="send-button">寄送郵件</button>
            </div>
        </form>

        <div ng-class="['message-box', message.type]" ng-show="message.visible" ng-bind="message.text"></div>
    </div>

    <div class="modal" ng-show="modals.template" style="display:flex;">
        <div style="position:absolute; width:100%; height:100%;" ng-click="modals.template = false"></div>
        <div class="modal-content">
            <span class="close-button" ng-click="modals.template = false">&times;</span>
            <h2>選擇郵件模板</h2>
            <div class="template-list-in-modal">
                <p ng-if="templates.length === 0" style="text-align: center; color: #6c757d; font-style: italic;">目前沒有儲存的模板。</p>
                <div class="template-list-item-modal" ng-repeat="tpl in templates" ng-click="applyTemplate(tpl)">
                    <h4 ng-bind="tpl.name"></h4>
                    <p>主旨: <span ng-bind="tpl.subject || '(無主旨)'"></span></p>
                </div>
            </div>
            <button class="clear-template-button" ng-click="clearTemplate()">清空當前內容</button>
        </div>
    </div>

    <div class="modal" ng-show="modals.group" style="display:flex;">
        <div style="position:absolute; width:100%; height:100%;" ng-click="modals.group = false"></div>
        <div class="modal-content">
            <span class="close-button" ng-click="modals.group = false">&times;</span>
            <h2>選擇電子郵件群組</h2>
            <div class="group-list-container">
                <div id="groupList">
                    <p ng-if="groups.length === 0">目前沒有任何群組。</p>
                    <div class="group-item" ng-repeat="group in groups">
                        <div class="group-header">
                            <label>
                                <input type="checkbox" ng-model="group.selectAll" ng-change="toggleGroupSelectAll(group)">
                                <h4 class="group-name" style="display:inline; margin-left: 5px;">
                                    <span ng-bind="group.name"></span> (<span ng-bind="group.emailsObj.length"></span>)
                                </h4>
                            </label>
                        </div>
                        <div class="email-checkbox-list">
                            <label class="email-checkbox-label" ng-repeat="em in group.emailsObj">
                                <input type="checkbox" ng-model="em.selected" ng-change="updateGroupSelectAllStatus(group)">
                                <span ng-bind="em.email"></span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-actions">
                <button class="modal-button select-all-button" type="button" ng-click="toggleAllGroups()" ng-bind="selectAllStatus ? '取消全選' : '全選'"></button>
                <button class="modal-button add-button" type="button" ng-click="confirmGroupSelection()">確認</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script src="{{ url_for('static', filename='js/batch_sending.ctrl.js') }}"></script>
</body>
</html>
